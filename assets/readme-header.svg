<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">Planet of Lana 2 Save Editor Header</title>
  <desc id="desc">Friendly handcrafted banner for the SaveEditors project page.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1d1b"/>
      <stop offset="50%" stop-color="#252a26"/>
      <stop offset="100%" stop-color="#131614"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#93c7aa"/>
      <stop offset="100%" stop-color="#6ea18f"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1600" height="520" fill="url(#bg)"/>
  <circle cx="1250" cy="120" r="240" fill="#87b09a" opacity="0.09"/>
  <circle cx="220" cy="460" r="220" fill="#8db5a1" opacity="0.08"/>
  <path d="M0,420 C250,320 420,500 700,420 C910,360 1110,430 1600,330 L1600,520 L0,520 Z" fill="#101311"/>
  <path d="M0,435 C250,335 420,515 700,435 C910,375 1110,445 1600,345" fill="none" stroke="#7ba995" stroke-opacity="0.3" stroke-width="2"/>

  <g transform="translate(92 92)">
    <rect x="0" y="0" rx="26" ry="26" width="136" height="136" fill="#d9f0de" opacity="0.95"/>
    <ellipse cx="68" cy="81" rx="38" ry="27" fill="#f9fffa" stroke="#26342d" stroke-width="3"/>
    <rect x="48" y="52" width="16" height="16" transform="rotate(45 56 60)" fill="#f9fffa" stroke="#26342d" stroke-width="3"/>
    <rect x="74" y="52" width="16" height="16" transform="rotate(45 82 60)" fill="#f9fffa" stroke="#26342d" stroke-width="3"/>
    <circle cx="56" cy="80" r="4.5" fill="#1f2b24"/>
    <circle cx="80" cy="80" r="4.5" fill="#1f2b24"/>
    <rect x="30" y="108" rx="12" ry="12" width="76" height="20" fill="#edf8f0" stroke="#557363" stroke-width="1.5"/>
    <text x="68" y="122" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#355245">PATCH</text>
  </g>

  <g transform="translate(274 126)">
    <text x="0" y="0" fill="#f3f7f5" font-size="54" font-family="Segoe UI, Arial, sans-serif" font-weight="700" letter-spacing="1.5">
      Planet of Lana 2 - Save Editor
    </text>
    <rect x="0" y="24" width="780" height="5" fill="url(#accent)" rx="3"/>
    <text x="0" y="74" fill="#bdd4c8" font-size="26" font-family="Segoe UI, Arial, sans-serif">
      Friendly save editing with backups, clear labels, and local-only exports.
    </text>
    <text x="0" y="118" fill="#89a197" font-size="19" font-family="Segoe UI, Arial, sans-serif">
      Built by SaveEditors • https://saveeditors.github.io/
    </text>
  </g>

  <g transform="translate(1120 310)">
    <rect x="0" y="0" width="420" height="120" rx="16" ry="16" fill="#101413" stroke="#3f544b"/>
    <text x="20" y="36" fill="#8fb79f" font-size="17" font-family="Consolas, monospace">Live Fields  |  GUID Catalog</text>
    <text x="20" y="62" fill="#8fb79f" font-size="17" font-family="Consolas, monospace">Map + Progress | Runtime Settings</text>
    <text x="20" y="88" fill="#8fb79f" font-size="17" font-family="Consolas, monospace">Unknown Data   | Hex Viewer</text>
  </g>

  <rect x="0" y="0" width="1600" height="520" fill="none" stroke="#4b5e56" stroke-opacity="0.6"/>
</svg>
